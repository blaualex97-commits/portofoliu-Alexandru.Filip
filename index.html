
<!DOCTYPE html>
<html>
<head>
    <title>Primul Meu Site</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 40px;
        }    

        h1 {
            color: orange;
        }

        h2 {
            color: red;
        }

        p {

      }

      button {
         background-color: orange;
         color: black;
         border: none;

         margin-top: 10px;

         border-radius: 8px;

     button:hover {

     }

</head>
   
<body>
        <h1>Salut! Eu sunt Alex</h1>
        <p>Acesta este primul meu site</p>

        <button onclick="Salut()">Click Aici:</button>
        <button onclick="schimbaCuloarea()">Schimba Culoarea</button>

        <p id="mesaj"></p>
        <button onclick="arataMesaj()">Apasa</button>

        <p id="textSchimbator">Imi place sa invat Full Stack Development</p>
        <button onclick="schimbaTextul()">Schimba textul</button>
        
        <script>
            function schimbaTextul() {
                let text = document.getElementById("textSchimbator");

                if (text.innerText === "Imi place sa invat Full Stack Development") {
                    text.innerText = "Vreau sa devin un programator de top!";
                } else {
                    text.innerText = "Imi place sa invat Full Stack Development";
                }
                
            }

            </script>

            <button onclick="culoareRandom()">culoarea Random</button>
            <script>
                function culoareRandom() {
                    let culori = ["red", "blue", "green", "purple", "orange", "pink", "yellow", "cyan", "magenta", "lime", "teal", "navy"];

                    let random = Math.floor(Math.random() * culori.length);

                    document.body.style.backgroundColor = culori[random];
                }    
                
            </script>

        <h2>Despre Mine</h2>
        <p>Invat programare si vreau sa devin cel mai tare</p>

        <h2>Contact</h2>
        <p>Email Adress: Blaualex97@gmail.com</p>

        <script>
            function Salut() {
                alert("Salut Alex! 👋");
            }

            function arataMesaj() {
                document.getElementById("mesaj").innerText = "Ai apasat! Esti cool! 😎";
            }

            function schimbaCuloarea() {
                document.body.style.backgroundColor = "darkblue";
            }
        </script>
       
             <button onclick="culoareRandom()">Tema Random</button>
        
        <script>
            function culoareRandom() {
                let culori = ["red", "blue", "green", "purple", "orange", "pink", "yellow", "cyan", "magenta", "lime", "teal", "navy"];
            
                let random = Math.floor(Math.random() * culori.length);

                let culoareAleasa = culori[random];

                document.body.style.backgroundColor = culoareAleasa;
                document.body.style.transition = "1,0s";

                if (culoareAleasa === "yellow" || culoareAleasa === "cyan" || culoareAleasa === "lime") {
                 
                    document.body.style.color = "black";
                } else {
                    document.body.style.color = "white";
                }
            }
        </script>
</body>
</html>
