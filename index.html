<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandru Filip | Frontend Developer</title>

<style>
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050505;
    color: white;
}

.container {
    width: min(1100px, 92%);
    margin: auto;
    padding: 60px 0 120px;
}

/* NAVBAR */
.navbar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 999px;
}

.navbar a:hover {
    background: orange;
    color: black;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 60px;
}

h1 {
    font-size: 50px;
}

.gradient {
    color: orange;
}

.hero-actions {
    margin-top: 25px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 18px;
    border-radius: 999px;
    background: orange;
    color: black !important;
    text-decoration: none;
    font-weight: bold;
}

.btn.secondary {
    background: transparent;
    color: orange !important;
    border: 1px solid orange;
}

.btn.secondary:hover {
    background: orange;
    color: black !important;
}

/* SECTIONS */
section {
    margin-top: 80px;
    text-align: center;
}

.card {
    background: #111;
    padding: 25px;
    border-radius: 15px;
}

/* PROJECTS */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
    gap: 20px;
}

.project {
    background: #111;
    padding: 20px;
    border-radius: 15px;
}

/* CONTACT */
.contact a {
    color: orange;
    text-decoration: none;
}

footer {
    text-align: center;
    margin-top: 50px;
    color: #777;
}
</style>
</head>

<nav class="navbar">

</nav>
